# This rule is not used by the project pg-idle-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to db.odilon.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: pg-idle-operator
    app.kubernetes.io/managed-by: kustomize
  name: postgresinstance-viewer-role
rules:
- apiGroups:
  - db.odilon.dev
  resources:
  - postgresinstances
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - db.odilon.dev
  resources:
  - postgresinstances/status
  verbs:
  - get
